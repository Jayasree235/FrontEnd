<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Heading tags -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

<!-- Paragraph -->
    <p>Paragraph 
           tag</p>
<!-- Break line -->
    <br>
    <!-- Center -->
    <center>Center</center>

    <!-- Horizontal Line -->
    <hr>
    <hr/>

    <!-- Preserve formatting tag = -->
    <pre>Preserve 
        formatting
             tag</pre>
    <p>Non-breaking space &nbsp;</p>
    <!-- list tags -->
     <h3>UnOrdered List</h3>
    <ul>
        <li>HTML</li>
        <li>Css</li>
        <li>javaScript</li>
    </ul>
    <h3>Ordered List</h3>
    <ol>
        <li>Mango</li>
        <li>Apple</li>
        <li>Graph</li>
        <li>Kiwi</li>
    </ol>
    
</body> 
</html>
