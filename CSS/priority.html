<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority</title>
    <!-- decendent selector -->
     <style>
        div p{
            color: blue;
        }
     </style>
</head>
<body>
    <div>
        <p>This paragraph displays blue due to low priority</p>
    </div>
    <div class="class">
        <p>This paragraph displays brown due to medium priority</p>
    </div>
    <div id="idname">
        <p>This paragraph displays green due to high priority</p>
    </div>
</body>
</html>
