<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your Name">
        <br><br>
        <label for="email">Email: </label>
        <input type="email" id="email" placeholder="Enter your email">
        <br><br>
        <label for="Password">Password: </label>
        <input type="password" id="Password" placeholder="Enter your Password">
        <br><br>
        <label for="number">Number:</label>
        <input type="number" id="number" placeholder="Enter your number">
        <br><br>
        <label for="date">Date:</label>
        <input type="date" id="date">
        <br><br>
        <label for="time">Time:</label>
        <input type="time" id="time">
        <br><br>
        <label for="color">Color:</label>
        <input type="color" id="color">
        <br><br>
        <label for="subscribe">Subscribe</label>
        <input type="checkbox" id="subscribe">
        <br><br>
        <label for="file">Upload File:</label>
        <input type="file" id="file">
        <br><br>
        <label for="range">Range:</label>
        <input type="range" id="range">
        <br><br>
        <label for="website">Website:</label>
        <input type="url" id="website">
        <br><br>
    <!-- Textarea- To take inputs in multiple lines -->
        <label for="comments">Comments:</label>
        <textarea name="comments" id="comments" rows="3" cols="2"></textarea>
        <br><br>

    <!-- Radio Buttons -->
     
        <label>Gender:</label>
        <br>
        <input type="radio" id="gender" value="male">
        <label for="gender">Male</label><br>
        <input type="radio" id="gender" value="female">
        <label for="gender">Female</label>
        <br>

    <!-- select -->
        <label for="country">Country</label>
        <select name="country" id="country">
        <option value="country">Country</option>
        <option value="india">India</option>
        <option value="us">US</option>
        <option value="uk">UK</option>
        </select>
        
    </form>
</body>
</html>
