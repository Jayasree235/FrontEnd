<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <hr>
    <form action="">
        <label for="firstname">FirstName</label>
        <input type="text" id="firstname" placeholder="Enter your LastName">
        <br><br>
        <label for="Middlename">MiddleName</label>
        <input type="text" id="Middlename" placeholder="Enter your MiddleName">
        <br><br>
        <label for="Lastname">LastName</label>
        <input type="text" id="Lastname" placeholder="Enter your LastName">
        <br><br>

        <label for="date">Date of birth:</label>
        <input type="date" id="date">
        <br><br>

        <label>Gender:</label>
        <br>
        <input type="radio" id="gender" value="male">
        <label for="gender">Male</label><br>
        <input type="radio" id="gender" value="female">
        <label for="gender">Female</label><br>
        <input type="radio" id="gender" value="others">
        <label for="gender">Others</label>
        <br><br>

        <label for="course">Address: </label>
        <textarea name="address" id="course">Address</textarea>
        <br><br>

        <label for="course">Courses</label>
        <select name="course" id="course">
            <option value="course">Course</option>
            <option value="java">Java</option>
            <option value="html">HTML</option>
            <option value="sql">SQL</option>
            <option value="python">Python</option>
        </select>

        <br><br>
        <label for="number">Phone Number:</label>
        <input type="number" id="number" placeholder="Enter your number">
        <br><br>

        <label for="email">Email: </label>
        <input type="email" id="email" placeholder="Enter your email">
        <br><br>
        <label for="Password">Password: </label>
        <input type="password" id="Password" placeholder="Enter your Password">
        <br><br>
        <label for="Password">Re-type Password: </label>
        <input type="password" id="Password" placeholder="Re-type your Password">
        <br><br>

        <button>Register</button>
    </form>
</body>
</html>
